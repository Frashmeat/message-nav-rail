name: 构建 Windows x64 预发行包

on:
  workflow_dispatch:
    inputs:
      bundle_version:
        description: "组合版本，例如 17.0.1-custom.1"
        required: true
        default: "17.0.1-custom.1"
      oh_my_pi_ref:
        description: "can1357/oh-my-pi 的 commit 或分支"
        required: true
        default: "b0d04e517335ada4e00ef8dc93aad9f4d1be8d21"

permissions:
  contents: read

jobs:
  build-windows-x64:
    runs-on: windows-latest
    timeout-minutes: 90
    env:
      BUN_VERSION: "1.3.14"
      BUNDLE_VERSION: ${{ inputs.bundle_version }}
      OH_MY_PI_REF: ${{ inputs.oh_my_pi_ref }}
      # Bun 1.3.14 在 Windows 跨盘移动编译目标时会失败；让缓存与 D: workspace 保持同盘。
      BUN_INSTALL_CACHE_DIR: ${{ github.workspace }}/.tmp/bun-cache
      OMP_DIR: ${{ github.workspace }}/.tmp/oh-my-pi
      RELEASE_PATCH: ${{ github.workspace }}/patches/oh-my-pi/17.0.1-release-windows-x64.patch

    steps:
      - name: 检出 message-nav-rail
        uses: actions/checkout@v4

      - name: 安装 Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: 检出 Oh My Pi 上游并应用定制补丁
        shell: pwsh
        run: |
          $ref = $env:OH_MY_PI_REF
          if ([string]::IsNullOrWhiteSpace($ref)) {
            throw "oh_my_pi_ref must not be empty"
          }
          if ($ref -notmatch '^[a-fA-F0-9]{7,40}$') {
            git check-ref-format --branch $ref
            if ($LASTEXITCODE -ne 0) {
              throw "Invalid Oh My Pi commit or branch: $ref"
            }
          }
          git clone --filter=blob:none https://github.com/can1357/oh-my-pi.git "$env:OMP_DIR"
          if ($LASTEXITCODE -ne 0) { throw "Failed to clone Oh My Pi" }
          git -C "$env:OMP_DIR" checkout --detach $ref
          if ($LASTEXITCODE -ne 0) { throw "Failed to checkout Oh My Pi ref: $ref" }
          git -C "$env:OMP_DIR" apply --check "$env:RELEASE_PATCH"
          if ($LASTEXITCODE -ne 0) { throw "Oh My Pi release patch check failed" }
          git -C "$env:OMP_DIR" apply "$env:RELEASE_PATCH"
          if ($LASTEXITCODE -ne 0) { throw "Failed to apply Oh My Pi release patch" }
          git -C "$env:OMP_DIR" diff --check
          if ($LASTEXITCODE -ne 0) { throw "Oh My Pi patched diff contains errors" }

      - name: 安装扩展依赖
        run: npm ci

      - name: 验证扩展
        run: |
          npm test
          npm run typecheck
          npm run build

      - name: 安装 Oh My Pi 依赖
        working-directory: ${{ env.OMP_DIR }}
        run: bun install --frozen-lockfile

      - name: 构建 Windows x64 native
        working-directory: ${{ env.OMP_DIR }}
        run: bun run build:native

      - name: 构建 Windows x64 omp.exe
        working-directory: ${{ env.OMP_DIR }}
        env:
          RELEASE_TARGETS: win32-x64
        run: bun run ci:release:build-binaries -- --targets win32-x64

      - name: 准备本地 dist 路径
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "$env:OMP_DIR\packages\coding-agent\dist" -Force | Out-Null
          Copy-Item "$env:OMP_DIR\packages\coding-agent\binaries\omp-windows-x64.exe" "$env:OMP_DIR\packages\coding-agent\dist\omp.exe" -Force

      - name: 探测内嵌 native
        shell: pwsh
        run: |
          .\scripts\probe-oh-my-pi-binary.ps1 -Binary "$env:OMP_DIR\packages\coding-agent\dist\omp.exe" -NativeVariant baseline -KeepWorkDir
          .\scripts\probe-oh-my-pi-binary.ps1 -Binary "$env:OMP_DIR\packages\coding-agent\dist\omp.exe" -NativeVariant modern -KeepWorkDir

      - name: 打包 Release
        shell: pwsh
        run: |
          .\scripts\package-release.ps1 `
            -BundleVersion $env:BUNDLE_VERSION `
            -OmpBinary "$env:OMP_DIR\packages\coding-agent\dist\omp.exe" `
            -OhMyPiRepo "$env:OMP_DIR" `
            -OhMyPiBaseRef $env:OH_MY_PI_REF `
            -ReleasePatch "$env:RELEASE_PATCH" `
            -SkipExtensionBuild

      - name: 上传 Windows x64 安装包
        uses: actions/upload-artifact@v4
        with:
          name: message-nav-rail-omp-${{ env.BUNDLE_VERSION }}-windows-x64
          path: |
            .tmp/release/*.zip
            .tmp/release/*.sha256
          if-no-files-found: error
          retention-days: 14
